<app-dashboard-widget-shell
    [eyebrow]="'WORKSPACE.DASHBOARD.LIBRARY' | translate"
    [title]="'WORKSPACE.DASHBOARD.RECENTLY_ADDED' | translate"
>
    <ng-container widget-actions>
        <button
            mat-icon-button
            [matMenuTriggerFor]="filterMenu"
            [attr.aria-label]="
                'WORKSPACE.DASHBOARD.FILTER_RECENTLY_ADDED' | translate
            "
            [matTooltip]="'WORKSPACE.DASHBOARD.FILTER_ITEMS' | translate"
        >
            <mat-icon>filter_list</mat-icon>
        </button>
        <mat-menu #filterMenu="matMenu">
            <button mat-menu-item (click)="onKindChange('all')">
                <mat-icon>{{ selectedKind() === 'all' ? 'check' : '' }}</mat-icon>
                <span [class.active-filter]="selectedKind() === 'all'">
                    {{ 'WORKSPACE.DASHBOARD.ALL' | translate }}
                </span>
            </button>
            <button mat-menu-item (click)="onKindChange('vod')">
                <mat-icon>{{ selectedKind() === 'vod' ? 'check' : '' }}</mat-icon>
                <span [class.active-filter]="selectedKind() === 'vod'">
                    {{ 'WORKSPACE.DASHBOARD.VOD' | translate }}
                </span>
            </button>
            <button mat-menu-item (click)="onKindChange('series')">
                <mat-icon>{{
                    selectedKind() === 'series' ? 'check' : ''
                }}</mat-icon>
                <span [class.active-filter]="selectedKind() === 'series'">
                    {{ 'WORKSPACE.DASHBOARD.SERIES' | translate }}
                </span>
            </button>
        </mat-menu>

        <mat-button-toggle-group
            class="view-toggle"
            [value]="viewMode()"
            hideSingleSelectionIndicator
            [attr.aria-label]="
                'WORKSPACE.DASHBOARD.RECENTLY_ADDED_VIEW_MODE' | translate
            "
            (change)="onViewModeChange($event.value)"
        >
            <mat-button-toggle
                value="list"
                [aria-label]="'WORKSPACE.DASHBOARD.LIST_VIEW' | translate"
            >
                <mat-icon>view_list</mat-icon>
            </mat-button-toggle>
            <mat-button-toggle
                value="grid"
                [aria-label]="'WORKSPACE.DASHBOARD.GRID_VIEW' | translate"
            >
                <mat-icon>grid_view</mat-icon>
            </mat-button-toggle>
        </mat-button-toggle-group>
    </ng-container>

    @if (loading()) {
        <div
            class="feedback-state feedback-state--loading"
            role="status"
            [attr.aria-label]="'WORKSPACE.DASHBOARD.LOADING_RECENTLY_ADDED' | translate"
        >
            <mat-progress-spinner mode="indeterminate" diameter="36" />
        </div>
    } @else if (loadFailed()) {
        <div class="feedback-state">
            <mat-icon class="feedback-state__icon">error_outline</mat-icon>
            <p class="feedback-state__title">
                {{
                    'WORKSPACE.DASHBOARD.RECENTLY_ADDED_LOAD_ERROR'
                        | translate
                }}
            </p>
            <p class="feedback-state__hint">
                {{
                    'WORKSPACE.DASHBOARD.RECENTLY_ADDED_LOAD_ERROR_HINT'
                        | translate
                }}
            </p>
            <button mat-stroked-button type="button" (click)="reloadItems()">
                {{ 'DOWNLOADS.RETRY' | translate }}
            </button>
        </div>
    } @else {
        <app-dashboard-activity-items
            [items]="activityItems()"
            [emptyLabel]="'WORKSPACE.DASHBOARD.NO_RECENTLY_ADDED' | translate"
            emptyIcon="movie_filter"
            [emptyHint]="
                'WORKSPACE.DASHBOARD.NO_RECENTLY_ADDED_HINT' | translate
            "
            [emptyActionLabel]="'WORKSPACE.DASHBOARD.ADD_SOURCE' | translate"
            [emptyActionLink]="['/workspace/sources']"
            [viewMode]="viewMode()"
        />
    }
</app-dashboard-widget-shell>
