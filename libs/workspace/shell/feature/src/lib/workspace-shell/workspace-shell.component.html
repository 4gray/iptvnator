<div
    class="workspace-shell"
    appPlaylistDropZone
    #dropZone="playlistDropZone"
>
    <app-playlist-drop-overlay [state]="dropZone.overlayState()" />
    @if (facade.showXtreamImportOverlay()) {
        <app-workspace-shell-import-overlay />
    }

    <app-workspace-shell-rail
        [isMacOS]="facade.isMacOS"
        [brandLink]="facade.brandLink()"
        [brandTooltipKey]="facade.brandTooltipKey()"
        [brandAriaLabelKey]="facade.brandAriaLabelKey()"
        [workspaceLinks]="facade.workspaceLinks()"
        [primaryContextLinks]="facade.primaryContextLinks()"
        [secondaryContextLinks]="facade.secondaryContextLinks()"
        [selectedSection]="facade.currentSection()"
        [railProviderClass]="facade.railProviderClass()"
        [isSettingsRoute]="facade.isSettingsRoute()"
    />

    <app-workspace-shell-header
        [playlistTitle]="facade.playlistTitle()"
        [playlistSubtitle]="facade.playlistSubtitle()"
        [canOpenPlaylistInfo]="facade.canOpenPlaylistInfo()"
        [canOpenAccountInfo]="facade.canOpenAccountInfo()"
        [searchQuery]="facade.searchQuery()"
        [canUseSearch]="facade.canUseSearch()"
        [searchPlaceholder]="facade.searchPlaceholder()"
        [searchScopeLabel]="facade.searchScopeLabel()"
        [searchStatusLabel]="facade.searchStatusLabel()"
        [headerShortcut]="facade.headerShortcut()"
        [headerBulkAction]="facade.headerBulkAction()"
        [canRefreshPlaylist]="facade.canRefreshPlaylist()"
        [isRefreshingPlaylist]="facade.isRefreshingPlaylist()"
        [isElectron]="facade.isElectron"
        [hasNoPlaylists]="facade.hasNoPlaylists()"
        [isDownloadsView]="facade.isDownloadsView()"
        [hasActiveDownloads]="facade.hasActiveDownloads()"
        [isSettingsRoute]="facade.isSettingsRoute()"
        (refreshPlaylistRequested)="facade.refreshCurrentPlaylist()"
        (searchChanged)="facade.onSearchInput($event)"
        (searchSubmitted)="facade.onSearchEnter($event)"
        (commandPaletteRequested)="facade.openCommandPalette()"
        (shortcutsRequested)="keyboardShortcuts.openShortcutsDialog()"
        (addPlaylistRequested)="facade.openAddPlaylistDialog()"
        (headerShortcutRequested)="facade.runHeaderShortcut()"
        (headerBulkActionRequested)="facade.runHeaderBulkAction()"
        (downloadsRequested)="facade.openDownloadsShortcut()"
        (playlistInfoRequested)="facade.openPlaylistInfo()"
        (accountInfoRequested)="facade.openAccountInfo()"
    />

    <div class="workspace-body" [class.single-pane]="!facade.showContextPanel()">
        @if (facade.showContextPanel()) {
            <app-workspace-shell-context-sidebar
                [variant]="facade.contextPanel()"
                [context]="facade.currentContext()"
                [section]="facade.currentSection()"
                [hasPlaylists]="!facade.hasNoPlaylists()"
            />
        }

        <main class="workspace-content">
            <router-outlet />
        </main>
    </div>

    @if (facade.showExternalPlaybackBar()) {
        @if (facade.externalPlaybackSession(); as session) {
            <footer class="workspace-now-playing">
                <app-external-playback-dock
                    [session]="session"
                    (closeClicked)="facade.closeActiveExternalSession()"
                    (artworkClicked)="
                        facade.openActiveExternalSessionTarget()
                    "
                />
            </footer>
        }
    }
</div>
