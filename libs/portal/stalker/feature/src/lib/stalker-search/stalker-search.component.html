<app-search-layout
    [searchTerm]="searchTerm()"
    [resultsCount]="resultsCount"
    [isLoading]="searchResultsResource.isLoading()"
    [showResultsCount]="true"
    [showSearchInput]="!isWorkspaceLayout"
    [showDetails]="showingDetails"
    (searchTermChange)="updateSearchTerm($event)"
>
    @if (showingDetails) {
        <app-stalker-inline-detail
            details
            [categoryId]="inlineDetail().categoryId"
            [seriesItem]="inlineDetail().seriesItem"
            [isSeries]="inlineDetail().isSeries"
            [vodDetailsItem]="inlineDetail().vodDetailsItem"
            [isFavorite]="isSelectedVodFavorite()"
            [playbackPosition]="selectedVodPlaybackPosition()"
            [inlinePlayback]="inlinePlayback()"
            [externalPlayback]="externalPlayback.activeSession()"
            (playClicked)="onVodPlay($event)"
            (resumeClicked)="onVodResume($event)"
            (inlineTimeUpdated)="handleInlineTimeUpdate($event)"
            (inlinePlaybackClosed)="closeInlinePlayer()"
            (streamUrlCopied)="showCopyNotification()"
            (inlineExternalFallbackRequested)="handleExternalFallbackRequest($event)"
            (favoriteToggled)="onVodFavoriteToggled($event)"
            (backClicked)="onVodBack()"
        />
    }

    <!-- Filters (single selection mode for stalker) -->
    <ng-container filters>
        @for (filter of filterConfig; track filter.key) {
            <mat-checkbox
                [ngModel]="filters()[filter.key]"
                (ngModelChange)="updateFilter(filter.key, $event)"
            >
                {{ filter.translationKey | translate }}
            </mat-checkbox>
        }
    </ng-container>

    <!-- Results -->
    <ng-container results>
        <div class="results-grid">
            @for (item of searchResultsResource.value(); track item.id) {
                <app-content-card
                    [title]="item.o_name || item.name"
                    [posterUrl]="item.screenshot_uri"
                    [type]="selectedFilterType() === 'vod' ? 'movie' : 'series'"
                    [showPlaceholder]="true"
                    (cardClick)="selectItem(item)"
                />
            }
        </div>
    </ng-container>
</app-search-layout>
