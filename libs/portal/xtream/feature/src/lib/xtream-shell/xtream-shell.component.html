@if (showImportOverlay()) {
    <app-loading-overlay
        [current]="getImportCount()"
        [total]="itemsToImport()"
    />
}

<div class="xtream-container">
    @if (!isWorkspaceLayout) {
        <app-navigation
            class="navigation-sidebar"
            [portalStatus]="portalStatus()"
            [selectedContentType]="selectedSection()"
        />
    }
    <router-outlet />
</div>
