<div
    class="sidebar"
    [class.sidebar-collapsed]="isSidebarCollapsed()"
    appResizable
    [minWidth]="250"
    [maxWidth]="600"
    [defaultWidth]="360"
    storageKey="unified-live-tab-sidebar-width"
>
    <app-global-favorites-list
        [channels]="channelsForList()"
        [mode]="mode()"
        [favoriteUids]="favoriteUids()"
        [epgMap]="epgMap()"
        [progressTick]="progressTick()"
        [activeUid]="activeUid()"
        [searchTermInput]="searchTerm()"
        [draggable]="mode() === 'favorites'"
        [sortMode]="sortMode()"
        (channelSelected)="onChannelSelected($event)"
        (playbackRequested)="onChannelPlaybackRequested($event)"
        (channelsReordered)="onReorder($event)"
        (favoriteToggled)="onFavoriteToggled($event)"
        (removeRequested)="onRemoveRequested($event)"
    />
</div>

<div class="content-container">
    @if (activeDetail()) {
        @if (shouldUseInlinePlayer()) {
            <div
                class="video-player"
                [class.video-player--radio]="isRadioSelection()"
            >
                @if (isRadioSelection()) {
                    <button
                        mat-icon-button
                        (click)="onClose()"
                        class="radio-close-btn"
                        aria-label="Close player"
                    >
                        <mat-icon>close</mat-icon>
                    </button>

                    <app-audio-player
                        [url]="currentStreamUrl()"
                        [icon]="
                            activeRadioChannel()?.tvg?.logo ??
                            activeDetail()?.playback?.thumbnail ??
                            ''
                        "
                        [channelName]="
                            activeRadioChannel()?.name ||
                            activeDetail()?.playback?.title ||
                            ''
                        "
                    />
                } @else {
                    <app-web-player-view
                        [streamUrl]="currentStreamUrl()"
                        [title]="activeDetail()?.playback?.title ?? ''"
                        [playback]="activeDetail()?.playback ?? null"
                        [playerOverride]="player()"
                        (externalFallbackRequested)="
                            handleExternalFallbackRequest($event)
                        "
                    />
                }
            </div>
        }

        @if (!isRadioSelection() && supportsEpg) {
            <div
                class="epg"
                [class.epg--inline]="shouldUseInlinePlayer()"
                [class.epg-collapsed]="
                    shouldUseInlinePlayer() && isLiveEpgPanelCollapsed()
                "
            >
                <div class="epg-content">
                    <app-epg-timeline
                        [programs]="timelinePrograms()"
                        [channelName]="timelineChannelName()"
                        [channelLogo]="timelineChannelLogo()"
                        [archivePlaybackAvailable]="timelineArchiveAvailable()"
                        [selectedDate]="selectedLiveEpgDate()"
                        [collapsed]="
                            shouldUseInlinePlayer() && isLiveEpgPanelCollapsed()
                        "
                        [summary]="liveEpgPanelSummary()"
                        (selectedDateChange)="onLiveEpgSelectedDateChange($event)"
                        (collapsedChange)="onLiveEpgPanelCollapsedChange($event)"
                    />
                </div>
            </div>
        }
    } @else {
        <app-portal-empty-state
            icon="live_tv"
            [message]="'CHANNELS.SELECT_CHANNEL_PLAYBACK' | translate"
        />
    }
</div>
