<span class="time"
    >{{ (item.startTimestamp ? item.startTimestamp * 1000 : item.start) | date: 'HH:mm' }}
    -
    {{ (item.stopTimestamp ? item.stopTimestamp * 1000 : item.stop) | date: 'HH:mm' }}</span
>
@if (isLive) {
    <span class="live badge" [matTooltip]="'EPG.LIVE_NOW' | translate"
        >live</span
    >
}

@if (showArchiveBadge) {
    <span
        class="archive-playback badge"
        [matTooltip]="'EPG.TIMESHIFT_AVAILABLE' | translate"
    >
        <mat-icon class="archive-playback__icon" aria-hidden="true"
            >replay</mat-icon
        >
        <span class="archive-playback__label"
            >{{ 'XTREAM.PLAY' | translate }}</span
        >
    </span>
}

@if (item?.desc) {
    <span
        (click)="$event.stopPropagation(); showDescription(item)"
        matListItemMeta
        class="description-icon"
        [matTooltip]="'EPG.PROGRAM_DIALOG.SHOW_PROGRAM_DETAILS' | translate"
        ><mat-icon>info</mat-icon></span
    >
}
