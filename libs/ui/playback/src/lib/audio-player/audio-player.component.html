<div class="radio-hero" data-cast-scope>
    @if (displayIcon() && !logoError()) {
        <div
            class="backdrop"
            [style.backgroundImage]="'url(' + displayIcon() + ')'"
        ></div>
    }
    <div class="vignette"></div>

    <app-cast-control [playback]="castPlayback()" />

    <div class="stage">
        <div class="artwork" [class.is-playing]="playState() === 'play'">
            @if (displayIcon() && !logoError()) {
                <img
                    [src]="displayIcon()"
                    alt=""
                    (error)="logoError.set(true)"
                />
            } @else {
                <div class="artwork-fallback">
                    <mat-icon>radio</mat-icon>
                </div>
            }
        </div>

        <h2 class="station-name">
            {{ channelName() || 'Radio' }}
        </h2>
        <span class="station-badge" [class.live]="playState() === 'play'">
            @if (playState() === 'play') {
                <span class="pulse"></span> LIVE
            } @else {
                PAUSED
            }
        </span>

        <div class="transport">
            <button
                mat-icon-button
                class="skip-btn"
                [matTooltip]="'AUDIO_PLAYER.PREVIOUS_STATION' | translate"
                [attr.aria-label]="'AUDIO_PLAYER.PREVIOUS_STATION' | translate"
                (click)="switchChannel('previous')"
            >
                <mat-icon>skip_previous</mat-icon>
            </button>

            <button
                class="play-btn"
                mat-fab
                [matTooltip]="
                    (playState() === 'play'
                        ? 'AUDIO_PLAYER.PAUSE'
                        : 'AUDIO_PLAYER.PLAY'
                    ) | translate
                "
                [attr.aria-label]="
                    (playState() === 'play'
                        ? 'AUDIO_PLAYER.PAUSE'
                        : 'AUDIO_PLAYER.PLAY'
                    ) | translate
                "
                (click)="playState() === 'play' ? stop() : play()"
            >
                <mat-icon>{{
                    playState() === 'play' ? 'pause' : 'play_arrow'
                }}</mat-icon>
            </button>

            <button
                mat-icon-button
                class="skip-btn"
                [matTooltip]="'AUDIO_PLAYER.NEXT_STATION' | translate"
                [attr.aria-label]="'AUDIO_PLAYER.NEXT_STATION' | translate"
                (click)="switchChannel('next')"
            >
                <mat-icon>skip_next</mat-icon>
            </button>
        </div>

        <div class="volume-row">
            <button
                mat-icon-button
                class="vol-icon"
                [matTooltip]="
                    (isMuted() || volume() === 0
                        ? 'AUDIO_PLAYER.UNMUTE'
                        : 'AUDIO_PLAYER.MUTE'
                    ) | translate
                "
                [attr.aria-label]="
                    (isMuted() || volume() === 0
                        ? 'AUDIO_PLAYER.UNMUTE'
                        : 'AUDIO_PLAYER.MUTE'
                    ) | translate
                "
                (click)="mute()"
            >
                <mat-icon>{{ volumeIcon() }}</mat-icon>
            </button>
            <mat-slider
                class="vol-slider"
                min="0"
                max="1"
                step="0.05"
                [matTooltip]="'AUDIO_PLAYER.VOLUME' | translate"
            >
                <input
                    matSliderThumb
                    [ngModel]="volume()"
                    [attr.aria-label]="'AUDIO_PLAYER.VOLUME' | translate"
                    (ngModelChange)="setVolume($event)"
                />
            </mat-slider>
        </div>
    </div>

    <audio preload="metadata" autoplay #audio></audio>
</div>
