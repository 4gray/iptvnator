@if (isLiveCategory()) {
    <app-portal-collection-live-shell
        [title]="'PORTALS.SIDEBAR.RECENT' | translate"
        [subtitle]="'PORTALS.SIDEBAR.LIVE_TV' | translate"
        [count]="liveItemsToShow().length"
        [streamUrl]="liveStreamUrl()"
        [isEmbeddedPlayer]="isEmbeddedPlayer()"
        [hasSelection]="!!selectedLiveItem()"
        [epgItems]="epgItems()"
        [isLoadingEpg]="isLoadingEpg()"
        [hasMoreEpg]="hasMoreEpg()"
        (loadMoreEpgClicked)="loadMoreEpg()"
    >
        <app-stalker-collection-channels-list
            liveChannels
            [items]="liveItemsToShow()"
            [selectedItemId]="selectedLiveItem()?.id ?? null"
            [favoriteIds]="liveFavoriteIds()"
            (playClicked)="selectLiveItem($event)"
            (favoriteToggled)="toggleLiveFavorite($event)"
        />
    </app-portal-collection-live-shell>
} @else {
    <app-portal-collection-shell
        [categories]="categories() ?? []"
        [items]="itemsToShow() ?? []"
        [playlistSubtitle]="playlistSubtitle"
        [playlistTitle]="playlistTitle()"
        [selectedCategoryId]="selectedCategoryId()"
        [layout]="layout"
        [mode]="mode"
        (categoryClicked)="setCategoryId($event)"
        (removeItem)="removeFromRecentlyViewed($event)"
        (headerActionClicked)="clearAllRecentlyViewed()"
        (openItem)="openItem($event)"
    >
        <app-stalker-inline-detail
            details
            [categoryId]="inlineDetail().categoryId"
            [seriesItem]="inlineDetail().seriesItem"
            [isSeries]="inlineDetail().isSeries"
            [vodDetailsItem]="inlineDetail().vodDetailsItem"
            [isFavorite]="isSelectedVodFavorite()"
            (playClicked)="onVodPlay($event)"
            (favoriteToggled)="onVodFavoriteToggled($event)"
            (backClicked)="onVodBack()"
        />
    </app-portal-collection-shell>
}
